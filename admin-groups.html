<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Golf Scoring - Admin Groups</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Newsreader:opsz,wght@6..72,500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar"><nav class="topbar-nav"><a class="nav-link" href="./index.html">Scoring</a><a class="nav-link" href="./leaderboard.html">Leaderboard</a><a class="nav-link active" href="./admin.html">Admin</a></nav></header>
      <main class="dashboard-grid single-column">
        <section class="panel">
          <div class="panel-heading"><div><p class="panel-kicker">Access</p><h2>Unlock admin controls</h2></div><button id="admin-signout-button" class="ghost-button hidden" type="button">Sign out</button></div>
          <form id="admin-login-form" class="stack-form"><label>Admin code<input id="admin-code-input" type="password" autocomplete="off" placeholder="Enter admin code" required /></label><button type="submit" class="primary-button">Unlock admin</button></form>
          <div id="admin-login-message" class="info-card muted-card">Admin settings stay hidden until the correct access code is entered.</div>
        </section>
        <section id="admin-controls-panel" class="panel hidden">
          <div class="panel-heading"><div><p class="panel-kicker">Admin</p><h2>Groups</h2></div><button id="save-button" class="primary-button" type="button">Save group changes</button></div>
          <div class="admin-workspace-header"><div><div class="section-subtitle">Active tournament</div><div class="workspace-title" id="workspace-title">Spring Invitational</div><div class="workspace-meta" id="workspace-meta">North Course · Live</div></div><div class="workspace-badges"><div class="summary-badge"><span class="badge-label">Players</span><span class="badge-value" id="workspace-player-count">0</span></div><div class="summary-badge"><span class="badge-label">Posted</span><span class="badge-value" id="workspace-posted-count">0</span></div></div></div>
          <nav class="admin-subnav"><a class="admin-subnav-link" href="./admin.html">Tournaments</a><a class="admin-subnav-link" href="./admin-players.html">Players</a><a class="admin-subnav-link active" href="./admin-groups.html">Groups</a><a class="admin-subnav-link" href="./admin-courses.html">Courses</a><a class="admin-subnav-link" href="./admin-settings.html">Settings</a></nav>
          <div class="admin-settings-card"><div class="section-subtitle">Tournament selector</div><div class="admin-controls admin-controls-settings admin-manager-simple"><label>Editing tournament<select id="selected-tournament-select"></select></label></div></div>
          <div id="admin-group-list" class="admin-list"></div>
        </section>
      </main>
    </div>
    <script src="./tournament-data.js"></script><script src="./admin-common.js"></script><script src="./admin-groups.js"></script>
  </body>
</html>
