<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Golf Scoring - Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Newsreader:opsz,wght@6..72,500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <nav class="topbar-nav">
          <a class="nav-link" href="./home.html">Home</a>
          <a class="nav-link" href="./index.html">Scoring</a>
          <a class="nav-link active" href="./leaderboard.html">Leaderboard</a>
          <a class="nav-link" href="./admin.html">Admin</a>
        </nav>
      </header>

      <section class="hero">
        <div class="hero-copy">
          <h2 id="leaderboard-event-name">Spring Invitational</h2>
          <p class="hero-course" id="leaderboard-course-name">North Course</p>
          <p class="hero-text" id="leaderboard-description">
            This page is built for display screens, staff tablets, or players who just
            want to follow the rankings as scores come in.
          </p>
        </div>
      </section>

      <main class="dashboard-grid single-column">
        <section class="panel panel-wide">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Net Leaderboard</p>
            </div>
          </div>
          <div id="leaderboard-list" class="leaderboard"></div>
        </section>

        <section class="panel panel-wide">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Handicap Guide</p>
              <h2>Starting net handicap for each player</h2>
            </div>
          </div>
          <div id="leaderboard-player-cards" class="player-cards"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./tournament-data.js"></script>
    <script src="./supabase-sync.js"></script>
    <script src="./leaderboard.js"></script>
  </body>
</html>
